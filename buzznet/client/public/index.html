<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0b" />

    <!-- ── Primary SEO ─────────────────────────────────────────────────── -->
    <title>BuzzNet — Share Your World</title>
    <meta name="description"
      content="BuzzNet is a social media platform to share photos, chat with friends in real time, and play multiplayer games together." />
    <meta name="keywords"
      content="BuzzNet, social media, share photos, real-time chat, multiplayer games, follow friends" />
    <meta name="author" content="BuzzNet" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://net-buzz.vercel.app" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn previews) ─────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://net-buzz.vercel.app" />
    <meta property="og:title"       content="BuzzNet — Share Your World" />
    <meta property="og:description" content="Share photos, chat in real time, and play multiplayer games with your friends on BuzzNet." />
    <meta property="og:image"       content="https://net-buzz.vercel.app/og-image.png" />
    <meta property="og:site_name"   content="BuzzNet" />
    <meta property="og:locale"      content="en_US" />

    <!-- ── Twitter Card ──────────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://net-buzz.vercel.app" />
    <meta name="twitter:title"       content="BuzzNet — Share Your World" />
    <meta name="twitter:description" content="Share photos, chat in real time, and play multiplayer games with your friends on BuzzNet." />
    <meta name="twitter:image"       content="https://net-buzz.vercel.app/og-image.png" />

    <!-- ── PWA / App Icons ───────────────────────────────────────────── -->
    <link rel="icon" type="image/png" sizes="32x32"  href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16"  href="%PUBLIC_URL%/favicon-16.png" />
    <link rel="apple-touch-icon"                      href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest"                              href="%PUBLIC_URL%/manifest.json" />

    <!-- ── Performance: preconnect to your API server ───────────────── -->
    <link rel="preconnect" href="https://netbuzz.onrender.com" />
    <link rel="dns-prefetch" href="https://accounts.google.com" />

    <!-- ── Structured Data (JSON-LD) — helps Google understand the app ─ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "BuzzNet",
      "url": "https://net-buzz.vercel.app",
      "description": "A social media platform to share photos, chat with friends in real time, and play multiplayer games.",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- ── Google Sign-In SDK ─────────────────────────────────────────── -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <noscript>
      BuzzNet requires JavaScript to run. Please enable JavaScript in your browser settings.
    </noscript>
    <div id="root"></div>
  </body>
</html>
